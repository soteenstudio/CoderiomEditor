name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js & Cache npm
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm' # Otomatis nge-cache folder global (.npm) berdasarkan package-lock.json

    - name: Setup Java JDK & Cache Gradle Core
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle' # Otomatis nge-cache metadata & core dari Gradle wrapper

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Kunci penghematan: Cache dependensi Gradle (library Android yang didownload)
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Cache folder node_modules biar "npm install" tinggal skip kalo gak ada package baru
    - name: Cache Node Modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies
      run: npm ci # Pake 'npm ci' lebih cepet & konsisten buat environment CI/CD dibanding 'npm install'

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Result
      uses: actions/upload-artifact@v4
      with:
        name: RedDeadEditor-Debug # Biar namanya keren sesuai project lo
        path: android/app/build/outputs/apk/debug/app-debug.apk
        compression-level: 0 # Meminimalkan enkapsulasi zip berlebih untuk file tunggal
